appId: com.gravity.utils
productName: Gravity Utils

publish:
  provider: github
  owner: ilyas-bozdemir
  repo: gravity-utils
  releaseType: release

directories:
  output: dist

files:
  - out/**/*
  - electron/**/*
  - package.json

asar: true

win:
  target: nsis
  icon: electron/icon.ico

nsis:
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  uninstallDisplayName: "Uninstall Gravity Utils"
  uninstallerIcon: electron/icon.ico
  deleteAppDataOnUninstall: false
