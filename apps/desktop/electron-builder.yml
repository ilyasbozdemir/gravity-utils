appId: com.gravity.studio
productName: Gravity Studio

publish:
  provider: github
  owner: ilyas-bozdemir
  repo: gravity-utils
  releaseType: release

directories:
  output: dist

files:
  - out/**/*
  - electron/**/*
  - package.json

asar: true

win:
  target: nsis
  icon: electron/icon.ico
  artifactName: "Gravity Studio Setup v${version}.${ext}"

nsis:
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  uninstallDisplayName: "Uninstall Gravity Studio"
  uninstallerIcon: electron/icon.ico
  deleteAppDataOnUninstall: false
