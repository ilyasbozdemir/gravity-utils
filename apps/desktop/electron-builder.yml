appId: com.gravity.utils
productName: Gravity Utils

publish:
  provider: github
  owner: ilyas-bozdemir
  repo: gravity-utils
  releaseType: release

directories:
  output: dist

files:
  - out/**/*
  - electron/**/*
  - package.json

asar: true

win:
  target: nsis
  icon: electron/icon.ico
mac:
  target: dmg
linux:
  target: AppImage

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
